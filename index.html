  <script>
const AVATARS=['👦','👧','🧒','👦🏽','👧🏽','🧒🏽'];
let state={name:'',age:8,avatar:'👦',xp:0,coins:0,level:1,badges:[],quizHistory:[],examHistory:[],streak:0,lastDate:'',settings:{sound:true,dark:false},dailyChallengeDate:'',dailyChallengeCompleted:false,weeklyQuizCount:0,weeklyStart:''};

function loadState(){const s=localStorage.getItem('bm2_state');if(s)state=JSON.parse(s);}
function saveState(){localStorage.setItem('bm2_state',JSON.stringify(state));}
function toggleDarkMode(){state.settings.dark=!state.settings.dark;document.documentElement.classList.toggle('dark',state.settings.dark);saveState();}
function applyDarkMode(){document.documentElement.classList.toggle('dark',state.settings.dark);}

const AudioCtx=window.AudioContext||window.webkitAudioContext;let audioCtx;
function getAudioCtx(){if(!audioCtx)audioCtx=new AudioCtx();return audioCtx;}
function playTone(freq,dur,type='sine'){if(!state.settings.sound)return;try{const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=0.12;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.stop(ctx.currentTime+dur);}catch(e){}}
function playCorrect(){playTone(523,.1);setTimeout(()=>playTone(659,.1),100);setTimeout(()=>playTone(784,.2),200);}
function playWrong(){playTone(200,.3,'sawtooth');}
function playClick(){playTone(800,.05);}

function showConfetti(){const c=document.getElementById('confetti-container');const colors=['#6366f1','#f59e0b','#22c55e','#ec4899','#06b6d4','#f97316'];for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*2+'s';p.style.borderRadius=Math.random()>0.5?'50%':'0';c.appendChild(p);}setTimeout(()=>{c.innerHTML='';},4000);}

function addXP(amount){state.xp+=amount;state.coins+=Math.floor(amount/2);const needed=state.level*100;if(state.xp>=needed){state.level++;state.xp-=needed;showConfetti();}saveState();updateDashboard();}

function showView(id){
  playClick();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view=document.getElementById('view-'+id);
  if(view){view.classList.add('active');view.querySelector('.min-h-screen')?.classList.add('animate-in');}
  if(id==='dashboard')updateDashboard();
  if(id==='nota')renderNota();
  if(id==='membaca')renderMembaca();
  if(id==='permainan')renderPermainan();
  if(id==='kuiz')renderKuiz();
  if(id==='latihan')renderLatihan();
  if(id==='peperiksaan')renderPeperiksaan();
  if(id==='pencapaian')renderPencapaian();
  if(id==='ulangkaji')renderUlangKaji();
  if(id==='settings')renderSettings();
  lucide.createIcons();
}

function startApp(){
  const name=document.getElementById('input-name').value.trim();
  if(!name){document.getElementById('input-name').style.borderColor='#ef4444';return;}
  state.name=name;state.age=parseInt(document.getElementById('input-age').value)||8;
  const today=new Date().toDateString();
  if(state.lastDate&&state.lastDate!==today){const diff=(new Date(today)-new Date(state.lastDate))/86400000;if(diff<=1)state.streak++;else state.streak=1;}else if(!state.lastDate){state.streak=1;}
  state.lastDate=today;
  const weekStart=getWeekStart();
  if(state.weeklyStart!==weekStart){state.weeklyQuizCount=0;state.weeklyStart=weekStart;}
  saveState();showView('dashboard');
}
function getWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toDateString();}

function filterMenu(){
  const q=document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('#menu-grid .menu-card').forEach(c=>{c.style.display=c.dataset.label.toLowerCase().includes(q)?'':'none';});
}

const MENU_ITEMS=[
  {id:'nota',icon:'📖',label:'Nota',color:'from-blue-400 to-blue-600'},
  {id:'membaca',icon:'📚',label:'Membaca',color:'from-pink-400 to-rose-500'},
  {id:'permainan',icon:'🎮',label:'Permainan',color:'from-purple-400 to-pink-500'},
  {id:'kuiz',icon:'❓',label:'Kuiz',color:'from-indigo-400 to-violet-600'},
  {id:'latihan',icon:'📋',label:'Latihan',color:'from-teal-400 to-green-500'},
  {id:'ulangkaji',icon:'🔄',label:'Ulang Kaji',color:'from-lime-400 to-green-500'},

function renderMenuGrid(){
  document.getElementById('menu-grid').innerHTML=MENU_ITEMS.map(m=>`<button onclick="showView('${m.id}')" data-label="${m.label}" class="menu-card bg-gradient-to-br ${m.color} rounded-2xl p-3 text-center text-white shadow-lg"><div class="text-2xl mb-1">${m.icon}</div><div class="text-xs font-semibold">${m.label}</div></button>`).join('');
}

function renderDailyChallenge(){
  const today=new Date().toDateString();
  if(state.dailyChallengeDate!==today){state.dailyChallengeCompleted=false;state.dailyChallengeDate=today;saveState();}
  const container=document.getElementById('daily-challenge-container');
  if(state.dailyChallengeCompleted){
    container.innerHTML=`<div class="card-style border-2 border-green-200"><div class="flex items-center gap-3"><span class="text-2xl">✅</span><div><p class="font-bold text-green-700">Cabaran Harian Selesai!</p><p class="text-xs text-gray-500">Kembali esok untuk cabaran baharu.</p></div></div></div>`;
  }else{
    container.innerHTML=`<div class="card-style border-2 border-amber-200 bg-gradient-to-r from-amber-50 to-yellow-50"><div class="flex items-center gap-3"><span class="text-2xl animate-bounce">⭐</span><div class="flex-1"><p class="font-bold text-amber-800">Cabaran Harian</p><p class="text-xs text-gray-600">Jawab 5 soalan untuk mendapat 50 XP bonus!</p></div><button onclick="startDailyChallenge()" class="bg-amber-500 text-white px-3 py-2 rounded-xl text-sm font-bold hover:bg-amber-600">Mula</button></div></div>`;
  }
}

function startDailyChallenge(){
  window.dailyQ=[...KUIZ_BANK].sort(()=>Math.random()-0.5).slice(0,5);
  window.dailyCurrent=0;window.dailyScore=0;
  showDailyChallengeQuestion();
}
function showDailyChallengeQuestion(){
  const container=document.getElementById('daily-challenge-container');
  if(window.dailyCurrent>=window.dailyQ.length){
    state.dailyChallengeCompleted=true;addXP(50);saveState();
    showConfetti();renderDailyChallenge();return;
  }
  const q=window.dailyQ[window.dailyCurrent];
  const shuffled=[...q.pilihan].sort(()=>Math.random()-0.5);
  container.innerHTML=`<div class="card-style animate-in"><p class="text-xs text-amber-600 font-bold mb-2">⭐ Cabaran ${window.dailyCurrent+1}/5</p><p class="font-bold text-gray-800 mb-3">${q.s}</p><div class="space-y-2" id="daily-options">${shuffled.map(p=>`<button onclick="answerDaily(this)" class="option-btn" data-value="${encodeURIComponent(p)}">${p}</button>`).join('')}</div><div id="daily-fb" class="mt-3 hidden"></div></div>`;
  window.dailyCorrect=q.jawapan;
  window.dailyHuraian=q.huraian;
}
function answerDaily(btn){
  const sel=decodeURIComponent(btn.dataset.value);
  const opts=btn.parentElement.querySelectorAll('.option-btn');
  opts.forEach(o=>{o.disabled=true;o.style.pointerEvents='none';});
  const fb=document.getElementById('daily-fb');
  const isCorrect=(sel===window.dailyCorrect);
  if(isCorrect){btn.classList.add('correct');playCorrect();window.dailyScore++;fb.innerHTML=`<div class="bg-green-50 p-2 rounded-xl text-green-700 text-sm">✅ Betul! ${window.dailyHuraian}</div>`;}
  else{btn.classList.add('wrong');playWrong();opts.forEach(o=>{if(decodeURIComponent(o.dataset.value)===window.dailyCorrect)o.classList.add('correct');});fb.innerHTML=`<div class="bg-red-50 p-2 rounded-xl text-red-700 text-sm">❌ ${window.dailyHuraian}</div>`;}
  fb.classList.remove('hidden');
  setTimeout(()=>{window.dailyCurrent++;showDailyChallengeQuestion();},2000);
}

function updateDashboard(){
  document.getElementById('dash-name').textContent=state.name||'Murid';
  document.getElementById('dash-avatar').textContent=state.avatar;
  document.getElementById('dash-level').textContent='Tahap '+state.level;
  document.getElementById('dash-coins').textContent='🪙 '+state.coins;
  const needed=state.level*100;
  document.getElementById('dash-xp-text').textContent=state.xp+' XP';
  document.getElementById('dash-xp-next').textContent=needed+' XP';
  document.getElementById('dash-xp-bar').style.width=(state.xp/needed*100)+'%';
  document.getElementById('stat-quiz').textContent=state.quizHistory.length;
  document.getElementById('stat-correct').textContent=state.quizHistory.filter(q=>q.correct).length;
  document.getElementById('stat-streak').textContent=state.streak;
  document.getElementById('weekly-progress-bar').style.width=Math.min(100,state.weeklyQuizCount/10*100)+'%';
  const badges=[{name:'Pemula',req:1},{name:'Rajin',req:5},{name:'Bijak',req:10},{name:'Cemerlang',req:20},{name:'Pakar',req:50}];
  const quizCount=state.quizHistory.length+state.examHistory.length;
  const earned=badges.filter(b=>quizCount>=b.req).length;
  document.getElementById('achievement-preview').textContent=earned+' lencana';
  renderDailyChallenge();
}

// ============ GENERIC ANSWER CHECKER ============
function checkAnswer(btn,feedbackId,onCorrect,onWrong){
  const selected=decodeURIComponent(btn.dataset.value);
  const correct=decodeURIComponent(btn.parentElement.dataset.correct);
  const huraian=btn.parentElement.dataset.huraian?decodeURIComponent(btn.parentElement.dataset.huraian):'';
  const opts=btn.parentElement.querySelectorAll('.option-btn');
  opts.forEach(o=>{o.disabled=true;o.style.pointerEvents='none';});
  const fb=document.getElementById(feedbackId);
  const isCorrect=(selected===correct);
  if(isCorrect){btn.classList.add('correct');playCorrect();fb.innerHTML=`<div class="bg-green-50 p-3 rounded-xl text-green-700">✅ Betul!${huraian?' '+huraian:''}</div>`;if(onCorrect)onCorrect();}
  else{btn.classList.add('wrong');playWrong();opts.forEach(o=>{if(decodeURIComponent(o.dataset.value)===correct)o.classList.add('correct');});fb.innerHTML=`<div class="bg-red-50 p-3 rounded-xl text-red-700">❌ Jawapan betul: ${correct}.${huraian?' '+huraian:''}</div>`;if(onWrong)onWrong();}
  fb.classList.remove('hidden');
  return isCorrect;
}

// ============ FLEXIBLE ANSWER MATCHING ============
function flexMatch(input, acceptedAnswers, isFullAnswer=true){
  // Minimum 2 characters to avoid single letters like 'i'
  if(input.length<2) return {match:false, score:0};
  
  const norm=s=>s.toLowerCase().replace(/[.,!?]/g,'').trim();
  const n=norm(input);
  
  // Check for exact or near-exact match with full answer
  for(let a of acceptedAnswers){
    const nA=norm(a);
    // Exact match = full marks
    if(n===nA) return {match:true, score:1, type:'exact'};
    
    // Partial credit: input is substantial substring of correct answer (≥50% of length)
    // E.g., "31 ogos setiap tahun" is 50% of "hari kebangsaan malaysia disambut pada 31 ogos setiap tahun"
    if(nA.includes(n) && n.length / nA.length >= 0.5){
      return {match:true, score:0.5, type:'partial'};
    }
    // Or input contains the entire correct answer phrase
    if(n.includes(nA)){
      return {match:true, score:0.5, type:'partial'};
    }
  }
  return {match:false, score:0};
}

function selectBS(idx,val){

  document.getElementById(`bs-${idx}-betul`).classList.toggle('bg-green-50',val==='/');

  document.getElementById(`bs-${idx}-salah`).classList.toggle('bg-red-50',val==='X');

  else{document.getElementById(`bs-${idx}-betul`).classList.remove('border-green-500','bg-green-50');}
}

function flexMatch(input, acceptedAnswers, isFullAnswer=true){
  // Minimum 2 characters to avoid single letters like 'i'
  if(input.length<2) return {match:false, score:0};
  
  const norm=s=>s.toLowerCase().replace(/[.,!?]/g,'').trim();
  const n=norm(input);
  
  // Check for exact or near-exact match with full answer
  for(let a of acceptedAnswers){
    const nA=norm(a);
    // Exact match = full marks
    if(n===nA) return {match:true, score:isFullAnswer?1:1, type:'exact'};
    // Contains key phrase = partial (1 mark for 2-mark questions)
    if(n.includes(nA) || nA.includes(n)) return {match:true, score:0.5, type:'partial'};
  }
  return {match:false, score:0};
}

function checkExamTextAnswer(){
  const set=ALL_EXAM_SETS[examState.setIdx];
  const q=set.bahagianB.soalan[examState.qIdx];
  const input=document.getElementById('exam-text-input').value.trim();
  const fb=document.getElementById('exam-fb');
  if(!input){fb.innerHTML=`<div class="bg-yellow-50 p-3 rounded-xl text-yellow-700">Sila tulis jawapan anda.</div>`;fb.classList.remove('hidden');return;}
  const result=flexMatch(input,q.jawapan,true);
  if(result.match){
    const marks=Math.round(result.score*q.markah);
    examState.scoreB+=marks;
    if(result.type==='exact'){playCorrect();fb.innerHTML=`<div class="bg-green-50 p-3 rounded-xl text-green-700">✅ Betul! (+${marks} markah)</div>`;}
    else{playClick();fb.innerHTML=`<div class="bg-yellow-50 p-3 rounded-xl text-yellow-700">⚠️ Separa betul! (+${marks} markah)<br><span class="text-xs">Jawapan penuh: ${q.jawapan[0]}</span></div>`;}
  }
  else{playWrong();fb.innerHTML=`<div class="bg-red-50 p-3 rounded-xl text-red-700">❌ Jawapan cadangan: ${q.jawapan[0]}</div>`;}
  fb.classList.remove('hidden');
  document.getElementById('exam-text-input').disabled=true;
  setTimeout(()=>{examState.qIdx++;showExamSection();},2500);
}

function checkExamText2Answer(){
  const set=ALL_EXAM_SETS[examState.setIdx];
  const q=set.bahagianB.soalan[examState.qIdx];
  const input1=document.getElementById('exam-text-input-1').value.trim();
  const input2=document.getElementById('exam-text-input-2').value.trim();
  const fb=document.getElementById('exam-fb');
  if(!input1&&!input2){fb.innerHTML=`<div class="bg-yellow-50 p-3 rounded-xl text-yellow-700">Sila tulis jawapan anda.</div>`;fb.classList.remove('hidden');return;}
  let marks=0;
  const r1=flexMatch(input1,q.jawapan1,true);
  const r2=flexMatch(input2,q.jawapan2,true);
  if(r1.match)marks+=Math.round(r1.score*q.markah/2);
  if(r2.match)marks+=Math.round(r2.score*q.markah/2);
  examState.scoreB+=marks;
  
  let feedback='';
  if(r1.match&&r2.match&&r1.type==='exact'&&r2.type==='exact'){
    playCorrect();feedback=`<div class="bg-green-50 p-3 rounded-xl text-green-700">✅ Betul kedua-duanya! (+${marks} markah)</div>`;
  }else if(marks>0){
    playClick();
    let details=[];
    if(r1.match)details.push(`(i) ${r1.type==='exact'?'✅':'⚠️'}`);else details.push(`(i) ❌`);
    if(r2.match)details.push(`(ii) ${r2.type==='exact'?'✅':'⚠️'}`);else details.push(`(ii) ❌`);
    feedback=`<div class="bg-yellow-50 p-3 rounded-xl text-yellow-700">${details.join(' ')} (+${marks} markah)<br><span class="text-xs">Jawapan: (i) ${q.jawapan1[0]} (ii) ${q.jawapan2[0]}</span></div>`;
  }else{
    playWrong();feedback=`<div class="bg-red-50 p-3 rounded-xl text-red-700">❌ Jawapan: (i) ${q.jawapan1[0]} (ii) ${q.jawapan2[0]}</div>`;
  }
  fb.innerHTML=feedback;
  fb.classList.remove('hidden');
  setTimeout(()=>{examState.qIdx++;showExamSection();},2500);
}

// Results
function showExamResult(c,set){
  const total=examState.scoreA*2+examState.scoreB+examState.scoreC;
  const maxMarks=30;
  const pct=Math.round(total/maxMarks*100);
  state.examHistory.push({title:set.title,date:new Date().toISOString(),score:total,total:maxMarks});
  state.weeklyQuizCount++;saveState();
  if(pct>=80)showConfetti();
  addXP(total);
  c.innerHTML=`<div class="card-style animate-in text-center"><div class="text-5xl mb-3">${pct>=80?'🏆':pct>=50?'📊':'💪'}</div><h3 class="font-bold text-xl">${set.title}</h3><p class="text-sm text-gray-500">${set.subtitle}</p><p class="text-4xl font-bold mt-3 ${pct>=80?'text-green-600':pct>=50?'text-amber-600':'text-red-600'}">${total}/${maxMarks}</p><p class="text-gray-500">${pct}%</p><div class="mt-4 text-left card-style text-sm space-y-1"><p>📝 Bahagian A (Sistem Bahasa): <span class="font-bold">${examState.scoreA*2}/10</span></p><p>📖 Bahagian B (Pemahaman): <span class="font-bold">${examState.scoreB}/10</span></p><p>✍️ Bahagian C (Penulisan): <span class="font-bold">${examState.scoreC}/10</span></p></div><button onclick="renderPeperiksaan()" class="btn-primary mt-4 w-full">Kembali ke Senarai</button></div>`;
}

// ============ PENCAPAIAN ============
function renderPencapaian(){
  const c=document.getElementById('pencapaian-content');
  const needed=state.level*100;
  const quizCount=state.quizHistory.length+state.examHistory.length;
  const badges=[{name:'Pemula',req:1,emoji:'🌱'},{name:'Rajin',req:5,emoji:'⭐'},{name:'Bijak',req:10,emoji:'🧠'},{name:'Cemerlang',req:20,emoji:'🏆'},{name:'Pakar',req:50,emoji:'👑'}];
  c.innerHTML=`<div class="card-style animate-in text-center mb-4"><div class="text-4xl mb-2">${state.avatar}</div><h3 class="font-bold text-xl">${state.name}</h3><p class="text-indigo-600 font-bold">Tahap ${state.level}</p><div class="mt-3"><div class="flex justify-between text-sm"><span>${state.xp} XP</span><span>${needed} XP</span></div><div class="bg-gray-200 rounded-full h-3 mt-1"><div class="bg-indigo-500 h-full rounded-full xp-bar" style="width:${(state.xp/needed)*100}%"></div></div></div><div class="grid grid-cols-3 gap-3 mt-4"><div><p class="text-2xl font-bold text-amber-600">${state.coins}</p><p class="text-xs text-gray-500">Syiling</p></div><div><p class="text-2xl font-bold text-green-600">${state.streak}</p><p class="text-xs text-gray-500">Hari Berturut</p></div><div><p class="text-2xl font-bold text-indigo-600">${quizCount}</p><p class="text-xs text-gray-500">Kuiz</p></div></div></div><div class="card-style"><h4 class="font-bold mb-3">🏅 Lencana</h4><div class="grid grid-cols-2 gap-3">${badges.map(b=>`<div class="p-3 rounded-xl text-center ${quizCount>=b.req?'bg-yellow-50 border border-yellow-200':'bg-gray-50 opacity-50'}"><div class="text-2xl">${b.emoji}</div><p class="font-bold text-sm mt-1">${b.name}</p><p class="text-xs text-gray-500">${quizCount>=b.req?'✅ Diperoleh':`${b.req} kuiz`}</p></div>`).join('')}</div></div>`;
}

// ============ ULANG KAJI ============
function renderUlangKaji(){
  const c=document.getElementById('ulangkaji-content');
  c.innerHTML=`<div class="card-style animate-in text-center mb-4"><div class="text-4xl mb-2">🔄</div><h3 class="font-bold">Ulang Kaji Pantas</h3><p class="text-gray-600 text-sm">Pilih jenis latihan untuk diulang kaji.</p></div><div class="space-y-3"><button onclick="showView('nota')" class="card-style w-full text-left hover:shadow-lg"><span class="mr-2">📖</span> Nota (Tatabahasa & Kosa Kata)</button><button onclick="showView('membaca')" class="card-style w-full text-left hover:shadow-lg"><span class="mr-2">📚</span> Membaca</button><button onclick="startKuiz()" class="card-style w-full text-left hover:shadow-lg"><span class="mr-2">❓</span> Kuiz Rawak</button></div>`;
}

// ============ SETTINGS ============
function renderSettings(){
  const c=document.getElementById('settings-content');
  c.innerHTML=`<div class="card-style"><h4 class="font-bold mb-3">👤 Profil</h4><p class="text-gray-600">Nama: <span class="font-bold">${state.name}</span></p><p class="text-gray-600">Umur: <span class="font-bold">${state.age} tahun</span></p></div><div class="card-style"><h4 class="font-bold mb-3">🌙 Paparan</h4><label class="flex items-center justify-between"><span>Mod Gelap</span><input type="checkbox" ${state.settings.dark?'checked':''} onchange="toggleDarkMode()" class="w-5 h-5"></label></div><div class="card-style"><h4 class="font-bold mb-3">🔊 Bunyi</h4><label class="flex items-center justify-between"><span>Kesan bunyi</span><input type="checkbox" ${state.settings.sound?'checked':''} onchange="state.settings.sound=this.checked;saveState()" class="w-5 h-5"></label></div><div class="card-style"><h4 class="font-bold mb-3">🗑️ Data</h4><p class="text-sm text-gray-500 mb-2">Padam semua kemajuan dan mula semula.</p><button onclick="document.getElementById('reset-confirm').classList.remove('hidden')" class="bg-red-100 text-red-700 px-4 py-2 rounded-xl font-medium w-full">Padam Semua Data</button><div id="reset-confirm" class="hidden mt-2 flex gap-2"><button onclick="resetData()" class="flex-1 bg-red-600 text-white rounded-xl py-2 font-bold">Ya, Padam</button><button onclick="document.getElementById('reset-confirm').classList.add('hidden')" class="flex-1 border-2 border-gray-200 rounded-xl py-2 font-semibold">Batal</button></div></div>`;
}
function resetData(){localStorage.removeItem('bm2_state');state={name:'',age:8,avatar:'👦',xp:0,coins:0,level:1,badges:[],quizHistory:[],examHistory:[],streak:0,lastDate:'',settings:{sound:true,dark:false},dailyChallengeDate:'',dailyChallengeCompleted:false,weeklyQuizCount:0,weeklyStart:''};document.documentElement.classList.remove('dark');showView('welcome');}

// ============ INIT ============
function init(){
  loadState();applyDarkMode();
  // Background images are now applied via inline styles on each view
  const ag=document.getElementById('avatar-grid');
  ag.innerHTML=AVATARS.map(a=>`<button type="button" onclick="selectAvatar(this,'${a}')" class="text-2xl p-2 rounded-xl border-2 ${state.avatar===a?'border-indigo-500 bg-indigo-50':'border-transparent hover:bg-gray-100'}">${a}</button>`).join('');
  if(state.name){document.getElementById('input-name').value=state.name;document.getElementById('input-age').value=state.age;renderMenuGrid();showView('dashboard');}else{renderMenuGrid();}
  lucide.createIcons();
}
function selectAvatar(btn,avatar){state.avatar=avatar;saveState();document.querySelectorAll('#avatar-grid button').forEach(b=>{b.classList.remove('border-indigo-500','bg-indigo-50');b.classList.add('border-transparent');});btn.classList.add('border-indigo-500','bg-indigo-50');btn.classList.remove('border-transparent');}

document.addEventListener('DOMContentLoaded',init);
</script>
 
</body></html>
